name: Build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  validate:
    name: Validate (${{ matrix.os }})
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  package:
    name: ${{ matrix.platform }} (${{ matrix.target }})
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Windows NSIS Installer ──
          - os: windows-latest
            platform: Windows
            target: nsis
            target-flag: win
            artifact: AEGIS-Setup-*.exe

          # ── Windows Portable ──
          - os: windows-latest
            platform: Windows
            target: portable
            target-flag: 'win portable'
            artifact: 'AEGIS *.exe'

          # ── macOS DMG (Apple Silicon) ──
          - os: macos-latest
            platform: macOS
            target: dmg-arm64
            target-flag: mac
            artifact: AEGIS-*-macOS-arm64.dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & Package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build && npx electron-builder --${{ matrix.target-flag }} --publish=never

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.platform }}-${{ matrix.target }}
          path: release/${{ matrix.artifact }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/**/*
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
